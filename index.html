<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
overflow:hidden;
}

/* container */

.loader-box{
text-align:center;
padding:40px 60px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* spinner moderne */

.spinner{
width:80px;
height:80px;
border-radius:50%;
background:conic-gradient(
#38bdf8,
#6366f1,
#a855f7,
#38bdf8
);
animation:spin 1.4s linear infinite;
margin:auto;
position:relative;
}

.spinner::before{
content:"";
position:absolute;
inset:8px;
background:#020617;
border-radius:50%;
}

/* animation */

@keyframes spin{
100%{ transform:rotate(360deg); }
}

/* texte */

.loading-text{
margin-top:25px;
font-size:18px;
color:white;
letter-spacing:2px;
}

.dots::after{
content:"";
animation:dots 1.5s steps(4,end) infinite;
}

@keyframes dots{
0%{content:"";}
25%{content:".";}
50%{content:"..";}
75%{content:"...";}
100%{content:"";}
}

</style>
</head>

<body>

<div class="loader-box">

<div class="spinner"></div>

<div class="loading-text">
Chargement<span class="dots"></span>
</div>

</div>

</body>
</html>
