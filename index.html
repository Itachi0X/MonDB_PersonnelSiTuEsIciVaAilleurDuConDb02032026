<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#020617,#0f172a);
font-family:Segoe UI,sans-serif;
color:white;
overflow:hidden;
}

.container{
width:480px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.7);
text-align:center;
}

img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
}

.text{
min-height:60px;
font-size:17px;
line-height:1.4;
}

.progress{
margin-top:20px;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#6366f1,#a855f7);
}

</style>
</head>

<body>

<div class="container">

<img id="img">

<div class="text" id="text"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

/* génération quasi infinie */

const subjects = [
"Les développeurs","Les chats","Les robots","Les astronautes",
"Les hackers","Les tortues","Les intelligences artificielles",
"Les explorateurs","Les scientifiques","Les gamers"
];

const verbs = [
"peuvent créer","ont découvert","utilisent","adorent",
"testent","construisent","imaginent","analysent"
];

const objects = [
"des univers virtuels","des planètes inconnues",
"des algorithmes incroyables","des mondes générés",
"des jeux impossibles","des technologies futuristes",
"des machines intelligentes"
];

const endings = [
"pendant que le système charge.",
"avant que le chargement se termine.",
"pendant que les données arrivent.",
"pendant l'initialisation du moteur.",
"pendant la compilation du monde."
];

const themes = [
"space","technology","cyberpunk","ai","nature",
"gaming","robot","future","galaxy"
];

/* phrase aléatoire */

function randomText(){

let text =
subjects[Math.floor(Math.random()*subjects.length)]+" "+
verbs[Math.floor(Math.random()*verbs.length)]+" "+
objects[Math.floor(Math.random()*objects.length)]+" "+
endings[Math.floor(Math.random()*endings.length)];

document.getElementById("text").innerText = text;

/* image random */

let theme = themes[Math.floor(Math.random()*themes.length)];

document.getElementById("img").src =
"https://source.unsplash.com/random/800x600?"+theme;

/* durée dépend de la longueur */

let duration = Math.max(8000, text.length * 80);

startProgress(duration);

}

/* progression */

function startProgress(duration){

let bar = document.getElementById("bar");
bar.style.transition = "none";
bar.style.width = "0%";

setTimeout(()=>{
bar.style.transition = duration+"ms linear";
bar.style.width = "100%";
},50);

}

/* changement aléatoire */

randomText();

setInterval(()=>{

if(Math.random()>0.5){
randomText();
}

},4000);

</script>

</body>
</html>
