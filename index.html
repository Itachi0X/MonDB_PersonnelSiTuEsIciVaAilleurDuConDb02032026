```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loader interactif</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#020617,#0f172a);
font-family:Segoe UI,sans-serif;
color:white;
cursor:pointer;
}

.container{
width:520px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.7);
text-align:center;
}

img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
}

.text{
min-height:80px;
font-size:17px;
line-height:1.5;
}

.progress{
margin-top:20px;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#6366f1,#a855f7);
}

.hint{
font-size:13px;
opacity:0.6;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container" onclick="refreshContent()">

<img id="img">

<div class="text" id="text">
Clique pour charger une info réelle...
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="hint">
👆 Clique pour voir une nouvelle info
</div>

</div>

<script>

/* image random */

function loadImage(){
document.getElementById("img").src =
"https://picsum.photos/800/400?random=" + Math.random();
}

/* météo réelle */

async function getWeather(){

try{

let res = await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current_weather=true"
);

let data = await res.json();

return "🌡 Température actuelle : " + data.current_weather.temperature + "°C";

}catch{

return "Impossible de récupérer la météo.";

}

}

/* wikipedia random */

async function getWiki(){

try{

let res = await fetch(
"https://fr.wikipedia.org/api/rest_v1/page/random/summary"
);

let data = await res.json();

return "📚 " + data.title + " : " + data.extract;

}catch{

return "Impossible de récupérer une info Wikipédia.";

}

}

/* choisir api */

async function randomInfo(){

if(Math.random() < 0.5){
return await getWeather();
}else{
return await getWiki();
}

}

/* progression */

function startProgress(text){

let duration = Math.max(8000, text.length * 60);

let bar = document.getElementById("bar");

bar.style.transition="none";
bar.style.width="0%";

setTimeout(()=>{
bar.style.transition = duration + "ms linear";
bar.style.width="100%";
},50);

}

/* refresh au clic */

async function refreshContent(){

loadImage();

let text = await randomInfo();

document.getElementById("text").innerText = text;

startProgress(text);

}

/* premier chargement */

refreshContent();

</script>

</body>
</html>
