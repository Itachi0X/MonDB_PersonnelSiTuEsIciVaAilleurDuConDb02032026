```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement dynamique</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#0f172a,#020617);
font-family:Segoe UI,sans-serif;
color:white;
}

.container{
width:580px;
padding:35px;
border-radius:22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 30px 80px rgba(0,0,0,0.8);
text-align:center;
cursor:pointer;
}

img{
width:100%;
height:240px;
object-fit:cover;
border-radius:14px;
margin-bottom:15px;
}

.text{
min-height:90px;
font-size:17px;
line-height:1.6;
}

.progress{
margin-top:20px;
height:10px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#6366f1,#a855f7);
}

.footer{
margin-top:12px;
font-size:13px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container" onclick="refreshContent()">

<img id="img">

<div id="text" class="text">
Clique pour charger une info du jour
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="footer">
📰 infos actuelles • météo • espace • histoire
</div>

</div>

<script>

/* IMAGE RANDOM */

function loadImage(){

document.getElementById("img").src =
"https://picsum.photos/900/500?random=" + Math.random();

}

/* METEO */

async function weather(){

let r = await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current_weather=true"
);

let d = await r.json();

return "🌡 Météo actuelle : " + d.current_weather.temperature + "°C";

}

/* ACTUALITE HACKER NEWS */

async function news(){

let ids = await fetch(
"https://hacker-news.firebaseio.com/v0/topstories.json"
).then(r=>r.json());

let id = ids[Math.floor(Math.random()*10)];

let article = await fetch(
"https://hacker-news.firebaseio.com/v0/item/"+id+".json"
).then(r=>r.json());

return "📰 Actu tech : " + article.title;

}

/* NASA IMAGE DU JOUR */

async function nasa(){

let r = await fetch(
"https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY"
);

let d = await r.json();

return "🪐 NASA aujourd'hui : " + d.title;

}

/* HISTOIRE DU JOUR */

async function history(){

let today = new Date();
let m = today.getMonth()+1;
let d = today.getDate();

let r = await fetch(
"https://byabbe.se/on-this-day/"+m+"/"+d+"/events.json"
);

let data = await r.json();

let e = data.events[Math.floor(Math.random()*data.events.length)];

return "📜 En "+e.year+" : "+e.description;

}

/* CITATION */

async function quote(){

let r = await fetch("https://zenquotes.io/api/random");

let d = await r.json();

return "💬 "+d[0].q+" — "+d[0].a;

}

/* PRIORISATION */

async function randomInfo(){

let rand=Math.random();

try{

if(rand < 0.35) return await news();
if(rand < 0.6) return await weather();
if(rand < 0.8) return await nasa();
if(rand < 0.95) return await history();

return await quote();

}catch{

return "Impossible de récupérer une info.";

}

}

/* PROGRESS BAR */

function startProgress(text){

let duration = Math.max(8000,text.length*55);

let bar=document.getElementById("bar");

bar.style.transition="none";
bar.style.width="0%";

setTimeout(()=>{

bar.style.transition=duration+"ms linear";
bar.style.width="100%";

},50);

}

/* REFRESH */

async function refreshContent(){

loadImage();

let text = await randomInfo();

document.getElementById("text").innerText=text;

startProgress(text);

}

/* START */

refreshContent();

</script>

</body>
</html>
```
