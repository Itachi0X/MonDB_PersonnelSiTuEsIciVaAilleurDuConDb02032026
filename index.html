```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement intelligent</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow:hidden;
}

.container{
width:560px;
padding:35px;
border-radius:22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 30px 80px rgba(0,0,0,0.8);
text-align:center;
cursor:pointer;
transition:transform .2s;
}

.container:hover{
transform:scale(1.02);
}

img{
width:100%;
height:240px;
object-fit:cover;
border-radius:14px;
margin-bottom:15px;
transition:opacity .4s;
}

.text{
min-height:90px;
font-size:17px;
line-height:1.6;
opacity:0.95;
}

.progress{
margin-top:22px;
height:10px;
background:rgba(255,255,255,0.1);
border-radius:30px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#6366f1,#a855f7);
box-shadow:0 0 10px #38bdf8;
}

.footer{
margin-top:12px;
font-size:13px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container" onclick="refreshContent()">

<img id="img">

<div class="text" id="text">
Clique pour afficher une information réelle
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="footer">
🌍 données en direct • clique pour changer
</div>

</div>

<script>

/* IMAGE RANDOM */

function loadImage(){

document.getElementById("img").style.opacity=0;

setTimeout(()=>{

document.getElementById("img").src =
"https://picsum.photos/900/500?random=" + Math.random();

document.getElementById("img").style.opacity=1;

},200);

}

/* API météo */

async function weather(){

let r = await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current_weather=true"
);

let d = await r.json();

return "🌡 Température actuelle : " + d.current_weather.temperature + "°C";

}

/* wikipedia */

async function wiki(){

let r = await fetch(
"https://fr.wikipedia.org/api/rest_v1/page/random/summary"
);

let d = await r.json();

return "📚 " + d.title + " : " + d.extract;

}

/* NASA */

async function nasa(){

let r = await fetch(
"https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY"
);

let d = await r.json();

return "🪐 NASA : " + d.title + " — " + d.explanation.substring(0,200)+"...";

}

/* activité solaire */

async function solar(){

let r = await fetch(
"https://services.swpc.noaa.gov/json/solar-cycle/observed-solar-cycle-indices.json"
);

let d = await r.json();

let last = d[d.length-1];

return "☀️ Activité solaire : taches solaires = "+last.ssnum;

}

/* random API */

async function randomInfo(){

let apis=[weather,wiki,nasa,solar];

let f = apis[Math.floor(Math.random()*apis.length)];

try{
return await f();
}catch{
return "⚠️ Impossible de récupérer une donnée.";
}

}

/* progression dynamique */

function startProgress(text){

let duration = Math.max(8000, text.length * 55);

let bar = document.getElementById("bar");

bar.style.transition="none";
bar.style.width="0%";

setTimeout(()=>{

bar.style.transition = duration+"ms linear";
bar.style.width="100%";

},60);

}

/* refresh */

async function refreshContent(){

loadImage();

let text = await randomInfo();

document.getElementById("text").innerText=text;

startProgress(text);

}

/* start */

refreshContent();

</script>

</body>
</html>
